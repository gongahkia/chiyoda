name: benchmark smoke

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  benchmark-v1-smoke:
    if: contains(github.event.pull_request.labels.*.name, 'benchmark-smoke')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: benchmark unit tests
        run: python -m pytest tests/test_benchmark.py
      - name: benchmark submit smoke
        run: python -m chiyoda.cli benchmark submit --suite v1 -o out/benchmark_submission_ci
      - name: upload benchmark smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-submission-ci
          path: out/benchmark_submission_ci
