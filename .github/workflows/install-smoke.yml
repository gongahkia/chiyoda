name: install smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  editable-install-help:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: cli help smoke
        run: python -m chiyoda.cli --help
