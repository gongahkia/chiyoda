name: rimea validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rimea-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
      - name: rimea scenario assertions
        run: |
          python -m chiyoda.cli validate-scenario scenarios/validation_rimea_01.yaml
          python -m chiyoda.cli assert-scenario scenarios/validation_rimea_01.yaml
          python -m chiyoda.cli validate-scenario scenarios/validation_rimea_04.yaml
          python -m chiyoda.cli assert-scenario scenarios/validation_rimea_04.yaml
          python -m chiyoda.cli validate-scenario scenarios/validation_rimea_06.yaml
          python -m chiyoda.cli assert-scenario scenarios/validation_rimea_06.yaml
          python -m chiyoda.cli validate-scenario scenarios/validation_rimea_07.yaml
          python -m chiyoda.cli assert-scenario scenarios/validation_rimea_07.yaml
