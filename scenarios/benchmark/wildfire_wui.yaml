scenario:
  name: wildfire_wui
  description: "Wind-driven WUI wildfire benchmark inspired by Marshall-Fire-like grassland-to-suburban exposure; not a reconstruction."
  metadata:
    reference_event: "Marshall Fire, Boulder County, Colorado, 2021-12-30"
    reference_sources:
      - "https://www.fema.gov/sites/default/files/documents/fema_rsl_marshall-fire-mat-report-p-2320_042025.pdf"
      - "https://research.noaa.gov/looking-back-at-colorados-marshall-fire/"
    modeling_note: "Stylized west-to-east grass/WUI fire front with ember spotting and road-mode switching."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXXXXX
          X@..S...........E..X
          X@.................X
          X....XXXX....XXXX..X
          X..................X
          X..@......S.....E..X
          X..................X
          X....XXXX....XXXX..X
          X@...............E.X
          XXXXXXXXXXXXXXXXXXXX
  population:
    total: 4
    cohorts:
      - name: wui_residents
        count: 4
        familiarity: 0.65
        calmness: 0.7
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "0", x: 1, y: 2}
          - {floor: "0", x: 3, y: 5}
          - {floor: "0", x: 1, y: 8}
  hazards:
    - type: WILDFIRE
      location: [1.5, 4.5, 0.0]
      radius: 0.8
      severity: 0.85
      spread_rate: 0.45
      wind_vector: [2.2, 0.15]
      diffusion_rate: 0.04
      visibility_reduction: 0.55
      ember_spotting_rate: 0.65
      ember_ignition_radius: 5.0
      ember_decay_rate: 0.08
  wui_egress:
    road_segments:
      - id: north_collector
        mode_switch: vehicle
        speed_multiplier: 3.2
        capacity: 3
        cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "0", x: 2, y: 1}
          - {floor: "0", x: 3, y: 1}
          - {floor: "0", x: 4, y: 1}
          - {floor: "0", x: 5, y: 1}
          - {floor: "0", x: 6, y: 1}
          - {floor: "0", x: 7, y: 1}
          - {floor: "0", x: 8, y: 1}
          - {floor: "0", x: 9, y: 1}
          - {floor: "0", x: 10, y: 1}
          - {floor: "0", x: 11, y: 1}
          - {floor: "0", x: 12, y: 1}
          - {floor: "0", x: 13, y: 1}
          - {floor: "0", x: 14, y: 1}
          - {floor: "0", x: 15, y: 1}
          - {floor: "0", x: 16, y: 1}
        cells_note: "north neighborhood collector to east exit"
      - id: central_collector
        mode_switch: vehicle
        speed_multiplier: 3.0
        capacity: 3
        cells:
          - {floor: "0", x: 3, y: 5}
          - {floor: "0", x: 4, y: 5}
          - {floor: "0", x: 5, y: 5}
          - {floor: "0", x: 6, y: 5}
          - {floor: "0", x: 7, y: 5}
          - {floor: "0", x: 8, y: 5}
          - {floor: "0", x: 9, y: 5}
          - {floor: "0", x: 10, y: 5}
          - {floor: "0", x: 11, y: 5}
          - {floor: "0", x: 12, y: 5}
          - {floor: "0", x: 13, y: 5}
          - {floor: "0", x: 14, y: 5}
          - {floor: "0", x: 15, y: 5}
          - {floor: "0", x: 16, y: 5}
      - id: south_collector
        mode_switch: vehicle
        speed_multiplier: 3.1
        capacity: 3
        cells:
          - {floor: "0", x: 1, y: 8}
          - {floor: "0", x: 2, y: 8}
          - {floor: "0", x: 3, y: 8}
          - {floor: "0", x: 4, y: 8}
          - {floor: "0", x: 5, y: 8}
          - {floor: "0", x: 6, y: 8}
          - {floor: "0", x: 7, y: 8}
          - {floor: "0", x: 8, y: 8}
          - {floor: "0", x: 9, y: 8}
          - {floor: "0", x: 10, y: 8}
          - {floor: "0", x: 11, y: 8}
          - {floor: "0", x: 12, y: 8}
          - {floor: "0", x: 13, y: 8}
          - {floor: "0", x: 14, y: 8}
          - {floor: "0", x: 15, y: 8}
          - {floor: "0", x: 16, y: 8}
  interventions:
    policy: wildfire_long_range_broadcast
    start_step: 0
    interval_steps: 12
    budget_per_interval: 1
    message_radius: 60.0
    credibility: 0.92
  information:
    mode: asymmetric
    observation_radius: 4.0
    gossip_radius: 3.0
    beacon_radius: 12.0
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 90
    dt: 0.1
    random_seed: 42
    hazard_avoidance_weight: 1.8
