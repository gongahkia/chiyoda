scenario:
  name: flood_urban
  description: "Urban flash-flood evacuation benchmark with a time-evolving inundation field; not an event reconstruction."
  metadata:
    hazard_class: "urban flooding"
    reference_sources:
      - "https://www.fema.gov/flood-maps"
      - "https://www.weather.gov/safety/flood"
      - "https://www.weather.gov/pbz/floods"
    modeling_note: "Stylized low-lying west corridor flooding with eastbound evacuation and rising street-depth penalties."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXXXXX
          X@....S.........E..X
          X..XXXX....XXXX....X
          X@.................X
          X..XXXX....XXXX....X
          X@....S.........E..X
          X..................X
          XXXXXXXXXXXXXXXXXXXX
  population:
    total: 3
    cohorts:
      - name: low_lying_residents
        count: 3
        familiarity: 0.55
        calmness: 0.72
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "0", x: 1, y: 3}
          - {floor: "0", x: 1, y: 5}
  hazards:
    - type: FLOOD
      location: [2.0, 3.5, 0.0]
      radius: 1.1
      severity: 0.8
      spread_rate: 0.34
      diffusion_rate: 0.05
      flow_vector: [1.4, 0.08]
      inundation_depth_m: 0.12
      inundation_rise_rate_mps: 0.05
      inundation_decay_rate: 0.005
      flood_depth_threshold_m: 0.55
      max_depth_m: 1.4
  interventions:
    policy: global_broadcast
    start_step: 0
    interval_steps: 15
    budget_per_interval: 1
    message_type: flood_warning
    message_radius: 40.0
    credibility: 0.9
  information:
    mode: asymmetric
    observation_radius: 4.0
    gossip_radius: 3.0
    beacon_radius: 10.0
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 100
    dt: 0.1
    random_seed: 42
    hazard_avoidance_weight: 2.0
