scenario:
  name: benchmark_v1_open_air_event_funnel
  description: "Open-air event egress benchmark with a plaza-to-funnel crowd-pressure point; stylized, not a reconstruction."
  metadata:
    benchmark_suite: v1
    geometry_class: open_air_outdoor
    reference_event: "Love Parade crowd disaster, Duisburg, 2010-07-24"
    reference_sources:
      - "https://svpt.uni-wuppertal.de/fileadmin/bauing/svpt/Publikationen/LoPa_EVC_Beitrag_english.pdf"
    modeling_note: "Uses the published open-air event plus constrained access-route context only to bias the outdoor funnel geometry."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXXXXX
          X@@@..............EX
          X.......XXXX.......X
          X..................X
          X@@@....X..X......EX
          X.......XXXX.......X
          X..................X
          XXXXXXXXXXXXXXXXXXXX
  population:
    total: 5
    cohorts:
      - name: event_attendees
        count: 5
        familiarity: 0.35
        calmness: 0.68
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "0", x: 2, y: 1}
          - {floor: "0", x: 3, y: 1}
          - {floor: "0", x: 1, y: 4}
          - {floor: "0", x: 2, y: 4}
  hazards:
    - type: CRUSH
      location: [8.5, 3.5, 0.0]
      radius: 1.4
      severity: 0.28
  interventions:
    policy: global_broadcast
    start_step: 0
    interval_steps: 15
    budget_per_interval: 1
    message_type: crowd_reroute
    message_radius: 40.0
    credibility: 0.84
  information:
    mode: asymmetric
    observation_radius: 5.0
    gossip_radius: 3.0
    beacon_radius: 10.0
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 180
    dt: 0.1
    random_seed: 42
    hazard_avoidance_weight: 1.0
  assertions:
    evacuated: {eq: 5}
    remaining: {eq: 0}
