scenario:
  name: quake_aftershock
  description: "Earthquake-aftershock evacuation benchmark with terrain damage and aftershock-triggered re-evacuation waves."
  metadata:
    hazard_class: "earthquake aftershock sequence"
    reference_sources:
      - "https://earthquake.usgs.gov/data/oaf/overview.php"
      - "https://www.usgs.gov/faqs/foreshocks-aftershocks-whats-difference"
    modeling_note: "Stylized mainshock/aftershock pulses that damage route cells and release sheltered occupants into renewed evacuation."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXXXXX
          X@.....S........E..X
          X...XXXX....XXXX...X
          X..................X
          X...XXXX....XXXX...X
          X@.............E...X
          X...XXXX....XXXX...X
          X@....@@...........X
          X..................X
          XXXXXXXXXXXXXXXXXXXX
  population:
    total: 5
    cohorts:
      - name: commuters
        count: 3
        familiarity: 0.65
        calmness: 0.68
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "0", x: 1, y: 5}
          - {floor: "0", x: 1, y: 7}
      - name: sheltered_after_mainshock
        count: 2
        release_step: 100
        familiarity: 0.45
        calmness: 0.62
        spawn_cells:
          - {floor: "0", x: 6, y: 7}
          - {floor: "0", x: 7, y: 7}
  hazards:
    - type: EARTHQUAKE
      location: [8.5, 4.5, 0.0]
      radius: 4.8
      severity: 0.82
      aftershock_schedule: [0, 20, 45]
      aftershock_decay_rate: 0.18
      aftershock_damage_increment: 0.55
      damage_radius: 5.5
      re_evacuation_radius: 7.0
  interventions:
    policy: global_broadcast
    start_step: 0
    interval_steps: 20
    budget_per_interval: 1
    message_type: aftershock_warning
    message_radius: 40.0
    credibility: 0.88
  information:
    mode: asymmetric
    observation_radius: 4.0
    gossip_radius: 3.0
    beacon_radius: 10.0
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 100
    dt: 0.1
    random_seed: 42
    hazard_avoidance_weight: 1.8
