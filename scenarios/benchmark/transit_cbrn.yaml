scenario:
  name: transit_cbrn
  description: "Compact transit CBRN evacuation benchmark."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXX
          X@...S..EX
          X..XXX...X
          X@.......X
          XXXXXXXXXX
  population:
    total: 2
    cohorts:
      - name: regulars
        count: 1
        familiarity: 0.8
        spawn_cells: [{floor: "0", x: 1, y: 1}]
      - name: visitors
        count: 1
        familiarity: 0.1
        spawn_cells: [{floor: "0", x: 1, y: 3}]
  hazards:
    - type: GAS
      location: [4.5, 3.0, 0.0]
      radius: 1.0
      severity: 0.45
      spread_rate: 0.01
      diffusion_rate: 0.02
      visibility_reduction: 0.2
  information:
    mode: asymmetric
    observation_radius: 4.0
    beacon_radius: 8.0
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 80
    dt: 0.1
    random_seed: 42
