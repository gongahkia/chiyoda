study:
  name: "LLM Hostile-Channel Red-Team Sweep"
  description: "Replayable hostile-channel sweep where LLM providers choose bounded adversarial claims under cache and budget controls."
  scenario_file: "station_baseline.yaml"
  repetitions: 1
  seeds: [42, 137]
  export:
    profile: "report"
    formats: ["png", "svg"]
    table_formats: ["parquet", "csv"]
    include_figures: false
  variants:
    - name: "no_hostile_channel"
      description: "Baseline with hostile channels disabled."
      scenario_overrides:
        simulation:
          max_steps: 40
        hostile_channels: []

    - name: "deterministic_decoy_exit"
      description: "Existing deterministic decoy-exit hostile channel."
      scenario_overrides:
        simulation:
          max_steps: 40
        hostile_channels:
          - id: "deterministic_decoy"
            channel_type: "gossip"
            objective: "decoy-exit"
            budget: 2
            start_step: 2
            interval_steps: 10
            plausibility: 0.75
            radius: 8.0
            target_persona:
              cohort: "tourists"

    - name: "llm_template_decoy_exit"
      description: "Template LLM provider chooses bounded decoy-exit claims and stores replay cache."
      scenario_overrides:
        simulation:
          max_steps: 40
        hostile_channels:
          - id: "llm_template_decoy"
            channel_type: "gossip"
            objective: "decoy-exit"
            budget: 2
            start_step: 2
            interval_steps: 10
            plausibility: 0.75
            radius: 8.0
            target_persona:
              cohort: "tourists"
            llm_claims_enabled: true
            llm_provider: "template"
            llm_model: "template"
            llm_cache_path: "out/llm_cache/red_team_template"
            llm_cache_mode: "cache_first"
            llm_store_cache: true
            llm_prompt_style: "hostile_red_team"
            llm_max_calls_per_run: 2
            llm_max_estimated_tokens_per_run: 4000

    - name: "llm_replay_decoy_exit"
      description: "Replay-only hostile claim generation using the template cache."
      scenario_overrides:
        simulation:
          max_steps: 40
        hostile_channels:
          - id: "llm_replay_decoy"
            channel_type: "gossip"
            objective: "decoy-exit"
            budget: 2
            start_step: 2
            interval_steps: 10
            plausibility: 0.75
            radius: 8.0
            target_persona:
              cohort: "tourists"
            llm_claims_enabled: true
            llm_provider: "replay"
            llm_model: "template"
            llm_cache_path: "out/llm_cache/red_team_template"
            llm_cache_mode: "replay_only"
            llm_store_cache: false
            llm_prompt_style: "hostile_red_team"
            llm_max_calls_per_run: 0
