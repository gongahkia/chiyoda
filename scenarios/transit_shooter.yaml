scenario:
  name: transit_shooter
  description: "Multi-floor active-shooter evacuation scenario with one hostile actor."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXX
          X@.....H.X
          X..X.....X
          X.....E..X
          XXXXXXXXXX
      - id: "1"
        z: 3.0
        text: |
          XXXXXXXXXX
          X@.......X
          X..X.....X
          X.....E..X
          XXXXXXXXXX
    connectors:
      - id: stairs_escape
        type: stairs
        from: {floor: "0", x: 2, y: 3}
        to: {floor: "1", x: 2, y: 3}
        bidirectional: true
        width: 1.2
        flow_rate: 1.2
  population:
    total: 2
    cohorts:
      - name: public
        count: 2
        familiarity: 0.2
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "1", x: 1, y: 1}
  hostile_agents:
    - name: active_shooter
      count: 1
      spawn_cells:
        - {floor: "0", x: 7, y: 1}
      range_m: 8.0
      accuracy: 0.4
  hazards:
    - type: SHOOTER
      location: [7.5, 1.5, 0.0]
      radius: 0.0
      severity: 0.8
      range_m: 8.0
      accuracy: 0.4
  information:
    mode: asymmetric
    observation_radius: 4.0
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 80
    dt: 0.1
    random_seed: 42
