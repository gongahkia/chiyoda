scenario:
  name: validation_multifloor_connectors
  description: "Three-floor connector regression with stairs, ramp, escalator, elevator, and a floor-1 hazard."
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXX
          X@..X@..X@..X@..X
          X...X...X...X...X
          X...X...X...X...X
          XXXXXXXXXXXXXXXXX
      - id: "1"
        z: 3.0
        text: |
          XXXXXXXXXXXXXXXXX
          XE..XE..XE..XXXXX
          X...X...X...XXXXX
          X...X...X...XXXXX
          XXXXXXXXXXXXXXXXX
      - id: "2"
        z: 6.0
        text: |
          XXXXXXXXXXXXXXXXX
          XXXXXXXXXXXXXXXXX
          XXXXXXXXXXXXX.E.X
          XXXXXXXXXXXXX...X
          XXXXXXXXXXXXXXXXX
    connectors:
      - id: stairs_main
        type: stairs
        from: {floor: "0", x: 3, y: 2}
        to: {floor: "1", x: 3, y: 2}
        bidirectional: true
        width: 1.2
        flow_rate: 1.2
        queue_mode: fifo
        panic_jam_density: 2.5
      - id: ramp_main
        type: ramp
        from: {floor: "0", x: 7, y: 2}
        to: {floor: "1", x: 7, y: 2}
        bidirectional: true
        width: 1.5
        flow_rate: 1.1
        queue_mode: fifo
      - id: escalator_main
        type: escalator
        from: {floor: "0", x: 11, y: 2}
        to: {floor: "1", x: 11, y: 2}
        bidirectional: true
        width: 1.0
        flow_rate: 1.5
        queue_mode: fifo
      - id: elevator_main
        type: elevator
        from: {floor: "0", x: 15, y: 2}
        to: {floor: "2", x: 13, y: 2}
        bidirectional: true
        width: 1.0
        capacity: 1
        flow_rate: 1.0
        queue_mode: fifo
        dwell_s: 0.2
        travel_s: 0.8
  population:
    total: 4
    cohorts:
      - name: stairs_case
        count: 1
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
      - name: ramp_case
        count: 1
        spawn_cells:
          - {floor: "0", x: 5, y: 1}
      - name: escalator_case
        count: 1
        spawn_cells:
          - {floor: "0", x: 9, y: 1}
      - name: elevator_case
        count: 1
        spawn_cells:
          - {floor: "0", x: 13, y: 1}
  hazards:
    - type: SMOKE
      location: [2.5, 2.5, 3.0]
      radius: 1.0
      severity: 0.2
      visibility_reduction: 0.1
  information:
    mode: perfect
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 350
    dt: 0.1
    random_seed: 42
  assertions:
    evacuated: {eq: 4}
    remaining: {eq: 0}
    travel_time_s: {min: 0.1, max: 35.0}
    connector_usage:
      stairs_main: {min: 1}
      ramp_main: {min: 1}
      escalator_main: {min: 1}
      elevator_main: {min: 1}
    connector_capacity:
      elevator_main: {eq: 1}
    connector_queue_length:
      stairs_main: {eq: 0}
      ramp_main: {eq: 0}
      escalator_main: {eq: 0}
      elevator_main: {eq: 0}
    no_impossible_floor_jumps: true
