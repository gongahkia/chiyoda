scenario:
  name: validation_rimea_04
  description: "RiMEA Test 4 scaled proxy: corridor density/fundamental-diagram smoke check."
  metadata:
    validation_standard: "RiMEA 4.1.1 Annex 1 Test 4"
    validation_scope: "scaled_ci_proxy"
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
          X............................E
          X............................E
          X............................E
          XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
  population:
    total: 20
    cohorts:
      - name: density_sample
        count: 20
        base_speed: 1.2
        familiarity: 1.0
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
          - {floor: "0", x: 2, y: 1}
          - {floor: "0", x: 3, y: 1}
          - {floor: "0", x: 4, y: 1}
          - {floor: "0", x: 5, y: 1}
          - {floor: "0", x: 1, y: 2}
          - {floor: "0", x: 2, y: 2}
          - {floor: "0", x: 3, y: 2}
          - {floor: "0", x: 4, y: 2}
          - {floor: "0", x: 5, y: 2}
  information:
    mode: perfect
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 600
    dt: 0.1
    random_seed: 42
  assertions:
    evacuated: {eq: 20}
    remaining: {eq: 0}
    travel_time_s: {min: 5.0, max: 80.0}
    agent_base_speed_mps: {min: 1.2, max: 1.2, mean_min: 1.2, mean_max: 1.2}
