        <<: [*hazard_low, *population_mixed, *policy_entropy_targeted]
    - name: "hazard_low__familiarity_mixed__bottleneck_avoidance"
      scenario_overrides:
        <<: [*hazard_low, *population_mixed, *policy_bottleneck_avoidance]

    - name: "hazard_low__familiarity_high__no_intervention"
