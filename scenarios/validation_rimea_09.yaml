scenario:
  name: validation_rimea_09
  description: "RiMEA Test 9 scaled proxy: crowd leaving a public room through four exits."
  metadata:
    validation_standard: "RiMEA 4.1.1 Annex 1 Test 9"
    validation_scope: "scaled_ci_proxy"
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXEXXEXXXXX
          X............X
          X............X
          X............X
          X............X
          X............X
          X............X
          XXXXXEXXEXXXXX
  destination_profiles:
    - exit: {floor: "0", x: 5, y: 0}
      profile: {door: north_west}
    - exit: {floor: "0", x: 8, y: 0}
      profile: {door: north_east}
    - exit: {floor: "0", x: 5, y: 7}
      profile: {door: south_west}
    - exit: {floor: "0", x: 8, y: 7}
      profile: {door: south_east}
  population:
    total: 40
    cohorts:
      - {name: north_west_group, count: 10, base_speed: 1.2, familiarity: 1.0, homophily_profile: {door: north_west}, homophily_weight: 5.0, spawn_cells: [{floor: "0", x: 4, y: 2}]}
      - {name: north_east_group, count: 10, base_speed: 1.2, familiarity: 1.0, homophily_profile: {door: north_east}, homophily_weight: 5.0, spawn_cells: [{floor: "0", x: 9, y: 2}]}
      - {name: south_west_group, count: 10, base_speed: 1.2, familiarity: 1.0, homophily_profile: {door: south_west}, homophily_weight: 5.0, spawn_cells: [{floor: "0", x: 4, y: 5}]}
      - {name: south_east_group, count: 10, base_speed: 1.2, familiarity: 1.0, homophily_profile: {door: south_east}, homophily_weight: 5.0, spawn_cells: [{floor: "0", x: 9, y: 5}]}
  information:
    mode: perfect
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 600
    dt: 0.1
    random_seed: 42
  assertions:
    evacuated: {eq: 40}
    remaining: {eq: 0}
    travel_time_s: {min: 1.0, max: 90.0}
    exit_usage:
      "0:5,0": {min: 5}
      "0:8,0": {min: 5}
      "0:5,7": {min: 5}
      "0:8,7": {min: 5}
