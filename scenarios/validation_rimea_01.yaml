scenario:
  name: validation_rimea_01
  description: "RiMEA Test 1 scaled proxy: maintain prescribed walking speed in a corridor."
  metadata:
    validation_standard: "RiMEA 4.1.1 Annex 1 Test 1"
    validation_scope: "scaled_ci_proxy"
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXXXXXXXXXXXXXXX
          X@......................E
          XXXXXXXXXXXXXXXXXXXXXXXXX
  population:
    total: 1
    cohorts:
      - name: adult_1mps
        count: 1
        base_speed: 1.0
        familiarity: 1.0
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
  information:
    mode: perfect
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 400
    dt: 0.1
    random_seed: 42
  assertions:
    evacuated: {eq: 1}
    remaining: {eq: 0}
    travel_time_s: {min: 10.0, max: 45.0}
    agent_base_speed_mps: {min: 1.0, max: 1.0, mean_min: 1.0, mean_max: 1.0}
