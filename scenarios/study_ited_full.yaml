study:
  name: "ITED Full Study"
  description: "Information-Theoretic Evacuation Dynamics — multi-variant study comparing information regimes, responder timing, and hazard conditions."
  scenario_file: "station_sarin.yaml"
  repetitions: 3
  seeds: [42, 137, 256]
  export:
    profile: "paper"
    formats: ["png", "svg", "pdf"]
    table_formats: ["parquet", "csv"]
  variants:
    - name: "baseline_no_hazard"
      description: "No hazard, asymmetric info — establishes fundamental diagram baseline."
      scenario_overrides:
        hazards: []
        responders: []

    - name: "perfect_info"
      description: "All agents have perfect knowledge of exits and hazards."
      scenario_overrides:
        information:
          mode: "perfect"

    - name: "no_info"
      description: "Agents start with zero knowledge — must discover or learn everything."
      scenario_overrides:
        information:
          mode: "none"

    - name: "asymmetric_info"
      description: "Default — mixed familiarity population with gossip propagation."

    - name: "responder_early"
      description: "First responders arrive at step 60 (t=6s) instead of 120."
      scenario_overrides:
        responders:
          - count: 3
            release_step: 60
            ppe_factor: 0.1
            spawn_cells:
              - [37, 11]
              - [37, 16]
            mission_target: [20, 10]

    - name: "responder_late"
      description: "First responders arrive at step 200 (t=20s)."
      scenario_overrides:
        responders:
          - count: 3
            release_step: 200
            ppe_factor: 0.1
            spawn_cells:
              - [37, 11]
              - [37, 16]
            mission_target: [20, 10]

    - name: "no_responder"
      description: "No first responders — tests information propagation without authority injection."
      scenario_overrides:
        responders: []

    - name: "high_decay"
      description: "Fast information decay — beliefs become stale quickly."
      scenario_overrides:
        information:
          decay_rate: 0.05

    - name: "no_beacons"
      description: "Remove PA/signage — agents rely only on observation and gossip."
      scenario_overrides:
        information:
          beacon_radius: 0.0
