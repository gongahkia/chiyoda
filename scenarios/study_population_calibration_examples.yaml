study:
  name: "Heuristic Population Calibration Examples"
  description: "Example-only cohort and behavior calibration variants. These are provenance-documented heuristics, not matched real-world calibrations."
  scenario_file: "station_sarin.yaml"
  repetitions: 3
  seeds: [42, 137, 256]
  export:
    profile: "calibration_examples"
    include_figures: false
    formats: []
    table_formats: ["parquet"]
  variants:
    - name: "documented_baseline"
      description: "Current mixed commuter/visitor profile with all exposed calibration knobs stated explicitly."
      scenario_overrides:
        <<: [*population_documented_baseline, *behavior_documented_baseline, *policy_none]

    - name: "regular_heavy_calm"
      description: "More regular commuters, higher familiarity and credibility, and lower anxiety transition weights."
      scenario_overrides:
        <<: [*population_regular_heavy, *behavior_calm_regulars, *policy_none]

    - name: "visitor_heavy_uncertain"
      description: "More unfamiliar grouped visitors with lower credibility, lower vision, and higher entropy-driven anxiety."
      scenario_overrides:
        <<: [*population_visitor_heavy, *behavior_uncertain_visitors, *policy_none]

    - name: "limited_visibility_stress"
      description: "Lower vision and speed with stronger hazard, density, and neighbor-driven panic transitions."
      scenario_overrides:
        <<: [*population_visibility_limited, *behavior_visibility_stress, *policy_none]
