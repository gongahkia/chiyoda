scenario:
  name: Station Baseline
  metadata:
    info_safety_tags:
    - station_baseline
    external_validation_evidence:
    - type: trajectory
      source: Snopkova et al. 2025 Scientific Data route-choice fixture
      validation_use: route-choice prior calibration only; not station evacuation certification
      scope: route-choice behavior reference
      metrics:
      - route_choice_fit
      file: ../data/calibration/route_choice_2025/normalized_route_choice_records.csv
      license: see data/calibration/route_choice_2025/figshare_article_27705402.json
    - type: reference
      source: Wuppertal bottleneck experiment reference fixture
      validation_use: bottleneck-flow diagnostic only
      scope: single-bottleneck pedestrian flow
      metrics:
      - specific_flow
      file: ../data/external/wuppertal_bottleneck_2018/040_c_56_h-.txt
      license: see data/external/wuppertal_bottleneck_2018/metadata.json
  layout:
    cell_size: 1.0
    floors:
    - id: '0'
      z: 0.0
      text: |-
        XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
        X......S.........X..........S.........X
        X................X....................X
        X....@@@@........X.......@@@@.........X
        X....@@@@...S..........X.@@@@.........X
        XXXXX..XXXXXX..XXXX..XXXX..XXXXXX..XXXX
        X......................................X
        X.....@@@@...........S.....@@@@.......X
        X......................................X
        E......................................E
        XXXXX..XXXXX..XX.......XX..XXXXX..XXXXX
        X......................................X
        X.......S..............................X
        X..@@@@.........S..........@@@@.......X
        X......................................X
        XXXXX..XXXXX..XXXX..XXXX..XXXXX..XXXXX
        X......................................X
        X.......S............S.................X
        X..@@@@..............@@@@..............X
        E..@@@@..............@@@@..............E
        XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
  population:
    total: 120
    cohorts:
    - name: regular_commuters
      count: 80
      personality: NORMAL
      calmness: 0.8
      familiarity: 0.7
      group_size: 1
    - name: tourists
      count: 40
      personality: NORMAL
      calmness: 0.6
      familiarity: 0.1
      group_size: 2
  information:
    mode: asymmetric
    decay_rate: 0.01
    observation_radius: 5.0
    gossip_radius: 2.0
    beacon_radius: 8.0
  simulation:
    max_steps: 400
    dt: 0.1
    random_seed: 42
