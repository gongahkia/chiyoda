scenario:
  name: validation_rimea_10
  description: "RiMEA Test 10 scaled proxy: assigned cohorts use corresponding exits."
  metadata:
    validation_standard: "RiMEA 4.1.1 Annex 1 Test 10"
    validation_scope: "scaled_ci_proxy"
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXXXXXXXX
          XE........EX
          X..........X
          X..........X
          XXXXXXXXXXXX
  destination_profiles:
    - exit: {floor: "0", x: 1, y: 1}
      profile: {route: main}
    - exit: {floor: "0", x: 10, y: 1}
      profile: {route: secondary}
  population:
    total: 8
    cohorts:
      - name: main_assigned
        count: 4
        base_speed: 1.2
        familiarity: 1.0
        homophily_profile: {route: main}
        homophily_weight: 5.0
        spawn_cells:
          - {floor: "0", x: 2, y: 3}
          - {floor: "0", x: 4, y: 3}
      - name: secondary_assigned
        count: 4
        base_speed: 1.2
        familiarity: 1.0
        homophily_profile: {route: secondary}
        homophily_weight: 5.0
        spawn_cells:
          - {floor: "0", x: 7, y: 3}
          - {floor: "0", x: 9, y: 3}
  information:
    mode: perfect
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 300
    dt: 0.1
    random_seed: 42
  assertions:
    evacuated: {eq: 8}
    remaining: {eq: 0}
    travel_time_s: {min: 1.0, max: 45.0}
    cohort_exit_usage:
      main_assigned:
        "0:1,1": {eq: 4}
      secondary_assigned:
        "0:10,1": {eq: 4}
