scenario:
  name: Station CBRN Sarin
  metadata:
    info_safety_tags:
    - station_sarin
    external_validation_evidence:
    - type: trajectory
      source: Snopkova et al. 2025 Scientific Data route-choice fixture
      validation_use: route-choice prior calibration only; not station CBRN validation
      scope: route-choice behavior reference
      metrics:
      - route_choice_fit
      file: ../data/calibration/route_choice_2025/normalized_route_choice_records.csv
      license: see data/calibration/route_choice_2025/figshare_article_27705402.json
    - type: hazard_field
      source: committed FDS smoke detector scalar reference fixture
      validation_use: imported scalar preservation check only
      scope: smoke scalar and visibility import
      metrics:
      - visibility_m
      - gas_concentration
      file: ../data/fds_reference/smoke_detector_reference.csv
      license: local fixture
  layout:
    cell_size: 1.0
    floors:
    - id: '0'
      z: 0.0
      text: |-
        XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
        X......S.........X..........S.........X
        X................X....................X
        X....@@@@........X.......@@@@.........X
        X....@@@@...S..........X.@@@@.........X
        XXXXX..XXXXXX..XXXX..XXXX..XXXXXX..XXXX
        X......................................X
        X.....@@@@...........S.....@@@@.......X
        X......................................X
        E......................................E
        XXXXX..XXXXX..XX.......XX..XXXXX..XXXXX
        X......................................X
        X.......S..............................X
        X..@@@@.........S..........@@@@.......X
        X......................................X
        XXXXX..XXXXX..XXXX..XXXX..XXXXX..XXXXX
        X......................................X
        X.......S............S.................X
        X..@@@@..............@@@@..............X
        E..@@@@..............@@@@..............E
        XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
  population:
    total: 120
    cohorts:
    - name: regular_commuters
      count: 80
      personality: NORMAL
      calmness: 0.8
      familiarity: 0.7
      group_size: 1
    - name: tourists
      count: 40
      personality: NORMAL
      calmness: 0.6
      familiarity: 0.1
      group_size: 2
  hazards:
  - type: GAS
    location:
    - 20.0
    - 10.0
    - 0.0
    radius: 0.5
    severity: 0.7
    spread_rate: 0.15
    diffusion_rate: 0.08
    wind_vector:
    - 0.1
    - 0.0
    visibility_reduction: 0.3
  responders:
  - count: 3
    release_step: 120
    ppe_factor: 0.1
    spawn_cells:
    - floor: '0'
      x: 37
      y: 11
    - floor: '0'
      x: 37
      y: 16
    mission_target:
    - 20.0
    - 10.0
    - 0.0
  information:
    mode: asymmetric
    decay_rate: 0.01
    observation_radius: 5.0
    gossip_radius: 2.0
    beacon_radius: 8.0
  simulation:
    max_steps: 500
    dt: 0.1
    random_seed: 42
