study:
  name: "OpenAI LLM Guidance Cache Pilot"
  description: "Tiny opt-in pilot that populates and replays generated evacuation messages under safety validation."
  scenario_file: "station_sarin.yaml"
  repetitions: 1
  seeds: [42]
  export:
    profile: "paper"
    formats: ["png", "svg", "pdf"]
    table_formats: ["parquet", "csv"]
    include_figures: false
  variants:
    - name: "static_beacon"
      description: "Conservative local deterministic communication baseline."
      scenario_overrides:
        interventions:
          policy: "static_beacon"
          start_step: 30
          interval_steps: 30
          budget_per_interval: 2
          message_radius: 8.0
          credibility: 0.9
          message_type: "route_guidance"

    - name: "entropy_targeted"
      description: "Deterministic adaptive targeting baseline with matched target-selection family."
      scenario_overrides:
        interventions:
          policy: "entropy_targeted"
          start_step: 30
          interval_steps: 20
          budget_per_interval: 3
          message_radius: 6.0
          credibility: 0.9
          message_type: "route_guidance"
          objective: "reduce_entropy_without_bottlenecking"

    - name: "llm_guidance_openai_cache_first"
      description: "OpenAI generated-message policy. Uses cache first, then live calls only on misses."
      scenario_overrides:
        interventions:
          policy: "llm_guidance"
          start_step: 30
          interval_steps: 60
          budget_per_interval: 1
          message_radius: 6.0
          credibility: 0.9
          message_type: "route_guidance"
          objective: "generated_guidance_under_safety_validation"
          llm_provider: "openai"
          llm_model: "gpt-5.4-mini"
          llm_cache_path: "out/llm_cache/openai_pilot"
          llm_cache_mode: "cache_first"
          llm_store_cache: true
          llm_max_radius: 8.0

    - name: "llm_guidance_replay"
      description: "Replay-only policy reading the exact same generated-message cache."
      scenario_overrides:
        interventions:
          policy: "llm_guidance"
          start_step: 30
          interval_steps: 60
          budget_per_interval: 1
          message_radius: 6.0
          credibility: 0.9
          message_type: "route_guidance"
          objective: "generated_guidance_under_safety_validation"
          llm_provider: "replay"
          llm_model: "gpt-5.4-mini"
          llm_cache_path: "out/llm_cache/openai_pilot"
          llm_cache_mode: "replay_only"
          llm_store_cache: false
          llm_max_radius: 8.0
