name: validation_wuppertal_bottleneck
description: >
  Chiyoda bottleneck-flow validation scenario paired with the public
  Wuppertal 2018 bottleneck trajectory reference. Geometry is grid-scale and
  supports flow comparison only; it is not a station or hazard validation.
metadata:
  external_reference: data/external/wuppertal_bottleneck_2018/metadata.json
  validation_scope: bottleneck_flow
layout:
  grid:
    - "XXXXXXXXXXX"
    - "X.........X"
    - "X.........X"
    - "X.........X"
    - "X.........X"
    - "X.........X"
    - "XXXX...XXXX"
    - "XXXX...XXXX"
    - "XXXX...XXXX"
    - "XXXX...XXXX"
    - "XXXXXEXXXXX"
population:
  total: 75
  cohorts:
    - name: wuppertal_flow_proxy
      count: 75
      base_speed: 1.34
      calmness: 0.8
      familiarity: 1.0
      spawn_cells:
        - [1, 1]
        - [2, 1]
        - [3, 1]
        - [4, 1]
        - [5, 1]
        - [6, 1]
