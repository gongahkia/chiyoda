scenario:
  name: validation_rimea_02
  description: "RiMEA Test 2 scaled proxy: maintain prescribed walking speed upstairs."
  metadata:
    validation_standard: "RiMEA 4.1.1 Annex 1 Test 2"
    validation_scope: "scaled_ci_proxy"
  layout:
    cell_size: 1.0
    floors:
      - id: "0"
        z: 0.0
        text: |
          XXXXXX
          X@...X
          X....X
          XXXXXX
      - id: "1"
        z: 3.0
        text: |
          XXXXXX
          X...EX
          X....X
          XXXXXX
    connectors:
      - id: rimea_stairs_up
        type: stairs
        from: {floor: "0", x: 4, y: 1}
        to: {floor: "1", x: 1, y: 1}
        bidirectional: true
        width: 1.2
        flow_rate: 1.0
        queue_mode: fifo
  population:
    total: 1
    cohorts:
      - name: upstairs_walker
        count: 1
        base_speed: 1.0
        familiarity: 1.0
        spawn_cells:
          - {floor: "0", x: 1, y: 1}
  information:
    mode: perfect
  behavior:
    freeze_probability: 0.0
  simulation:
    max_steps: 250
    dt: 0.1
    random_seed: 42
  assertions:
    evacuated: {eq: 1}
    remaining: {eq: 0}
    travel_time_s: {min: 1.0, max: 30.0}
    connector_usage:
      rimea_stairs_up: {min: 1}
    no_impossible_floor_jumps: true
