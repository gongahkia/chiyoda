schema_version: 1
objectives:
  false-protective-action:
    description: Misleading or incomplete guidance that steers people toward an unsafe or non-useful protective action.
    incidents:
      - id: hawaii_2018_false_missile_alert
        title: Hawaii Emergency Management Agency January 13, 2018 false ballistic missile alert
        primary_url: https://docs.fcc.gov/public/attachments/DOC-350119A1.pdf
      - id: rio_grande_do_sul_2024_warning_messages
        title: Rio Grande do Sul 2024 disaster warning-message protective-action gaps
        primary_url: https://seer.unisc.br/index.php/redes/article/view/19701/11870
  threat-amplification:
    description: Claims that overstate hazard presence, scale, certainty, or response failure.
    incidents:
      - id: hawaii_2018_false_missile_alert
        title: Hawaii Emergency Management Agency January 13, 2018 false ballistic missile alert
        primary_url: https://docs.fcc.gov/public/attachments/DOC-350119A1.pdf
      - id: helene_2024_ai_generated_imagery
        title: North Carolina Hurricane Helene AI-generated imagery and false reports
        primary_url: https://www.ncdps.gov/news/press-releases/2024/10/04/guide-highlighting-trusted-information-sources
  authority-confusion:
    description: Claims that blur, mimic, or misstate official emergency-management authority.
    incidents:
      - id: helene_milton_2024_fake_fema_inspectors
        title: Fake FEMA inspectors and contractors after Hurricanes Debby, Helene, and Milton
        primary_url: https://www.fema.gov/press-release/20250317/dont-get-scammed-be-aware-fake-fema-inspectors-and-contractors
      - id: hawaii_wildfire_2023_aid_confiscation_rumor
        title: Hawaii wildfire aid-confiscation rumor naming FEMA and the Red Cross
        primary_url: https://www.fema.gov/disaster/4724/rumor-response
  social-proof-poisoning:
    description: Repeated peer, crowd, or social-media claims that make unsupported information look validated.
    incidents:
      - id: helene_2024_social_misinformation
        title: Hurricane Helene false reports and misinformation shared on social media
        primary_url: https://www.ncdps.gov/news/press-releases/2024/10/04/guide-highlighting-trusted-information-sources
      - id: helene_milton_2024_rumor_response
        title: FEMA Hurricane Helene and Milton rumor response
        primary_url: https://www.fema.gov/disaster/recover/rumor/hurricane-rumor-response
theory_references:
  - id: tamas_2511_05269
    title: "TAMAS: Benchmarking Adversarial Risks in Multi-Agent LLM Systems"
    primary_url: https://arxiv.org/abs/2511.05269
  - id: aitm_2502_14847
    title: Red-Teaming LLM Multi-Agent Systems via Communication Attacks
    primary_url: https://arxiv.org/abs/2502.14847
  - id: mast_2508_03125
    title: "Attack the Messages, Not the Agents: A Multi-round Adaptive Stealthy Tampering Framework for LLM-MAS"
    primary_url: https://arxiv.org/abs/2508.03125
